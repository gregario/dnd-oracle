name: Sync 5e SRD Data

on:
  schedule:
    # Weekly on Mondays at 06:00 UTC (5e-bits/5e-database updates infrequently)
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Fetch latest 5e SRD data
        run: npm run fetch-data

      - name: Check for data changes
        id: diff
        run: |
          if git diff --quiet src/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Data is up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data has changed:"
            git diff --stat src/data/
          fi

      - name: Build
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Test
        if: steps.diff.outputs.changed == 'true'
        run: npm test

      - name: Configure git
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit data sync
        if: steps.diff.outputs.changed == 'true'
        run: |
          git add src/data/
          git commit -m "chore: sync 5e SRD data ($(date -u +%Y-%m-%d))"

      - name: Bump version, sync manifests, publish, tag, release
        if: steps.diff.outputs.changed == 'true'
        env:
          # No NODE_AUTH_TOKEN — npm publish authenticates via OIDC trusted
          # publisher (configured at npmjs.com → package → access). Setting
          # NODE_AUTH_TOKEN would override OIDC and use the token instead,
          # which fails with 404 if the token's scope doesn't include this package.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          NEW_VERSION=$(npm version patch --no-git-tag-version | sed 's/^v//')
          export NEW_VERSION
          echo "Releasing v$NEW_VERSION"

          # Sync server.json (MCP Registry manifest)
          node -e "
            const fs = require('fs');
            const v = process.env.NEW_VERSION;
            const s = JSON.parse(fs.readFileSync('server.json', 'utf8'));
            s.version = v;
            if (s.packages && s.packages[0]) s.packages[0].version = v;
            fs.writeFileSync('server.json', JSON.stringify(s, null, 2) + '\n');
          "

          # Sync status.json (factory tracker)
          node -e "
            const fs = require('fs');
            const v = process.env.NEW_VERSION;
            const s = JSON.parse(fs.readFileSync('status.json', 'utf8'));
            s.version = v;
            if (s.npm) s.npm.version = v;
            if (s.github) s.github.release_tag = 'v' + v;
            fs.writeFileSync('status.json', JSON.stringify(s, null, 2) + '\n');
          "

          npm run build

          # OIDC trusted publishing requires npm >= 11.5.1; Node 20 ships
          # with npm 10. Upgrade just for this step.
          npm install -g npm@latest
          npm publish --access public --provenance

          git add package.json package-lock.json server.json status.json
          git commit -m "chore: release v$NEW_VERSION (data sync)"
          git tag "v$NEW_VERSION"

          git pull --rebase origin main
          git push origin main
          git push origin "v$NEW_VERSION"

          gh release create "v$NEW_VERSION" \
            --title "v$NEW_VERSION" \
            --generate-notes
